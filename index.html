<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao diện IoT Cao Cấp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f8fafc;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Nền trang trí trừu tượng */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.1) 0%, rgba(37, 99, 235, 0.05) 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        .container-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 32px;
            padding: 28px;
            display: flex;
            align-items: center;
            gap: 24px;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04),
                        inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08);
        }

        .icon-container {
            width: 72px;
            height: 84px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.4s ease;
        }

        .card:hover .icon-container {
            transform: scale(1.1) rotate(-5deg);
        }

        /* Hiệu ứng sóng nước cho độ ẩm */
        .water-wave {
            position: relative;
            overflow: hidden;
        }

        @keyframes wave {
            0% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0); }
        }

        .animate-wave {
            animation: wave 2s ease-in-out infinite;
        }

        .data-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }

        .data-value {
            font-size: 2.75rem;
            font-weight: 800;
            color: #1e293b;
            line-height: 1;
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .unit {
            font-size: 1.25rem;
            font-weight: 600;
            color: #64748b;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.813rem;
            font-weight: 600;
            margin-top: 8px;
        }

        /* Custom Progress Bar */
        .custom-progress {
            height: 6px;
            background: #f1f5f9;
            border-radius: 100px;
            margin-top: 16px;
            width: 120px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 100px;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 2s infinite;
        }

        @keyframes shine {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }

        /* Màu sắc cụ thể */
        .temp-theme { color: #f97316; }
        .temp-bg { background: #fff7ed; }
        .temp-fill { background: linear-gradient(90deg, #fb923c, #f97316); }
        .temp-status { background: #ffedd5; color: #ea580c; }

        .humid-theme { color: #0ea5e9; }
        .humid-bg { background: #f0f9ff; }
        .humid-fill { background: linear-gradient(90deg, #38bdf8, #0ea5e9); }
        .humid-status { background: #e0f2fe; color: #0369a1; }

    </style>
</head>
<body>

    <div class="blob"></div>

    <div class="container-wrapper">
        
        <!-- Thẻ Nhiệt Độ -->
        <div class="card">
            <div class="icon-container temp-bg shadow-sm">
                <i class="fa-solid fa-temperature-three-quarters text-3xl temp-theme"></i>
            </div>
            <div class="flex-1">
                <div class="data-label temp-theme">Nhiệt độ</div>
                <div class="data-value">
                    24.3<span class="unit">°C</span>
                </div>
                <div class="status-pill temp-status">
                    <i class="fa-solid fa-face-smile mr-2"></i>Thoải mái
                </div>
                <div class="custom-progress">
                    <div class="progress-fill temp-fill" style="width: 65%;"></div>
                </div>
            </div>
        </div>

        <!-- Thẻ Độ Ẩm -->
        <div class="card">
            <div class="icon-container humid-bg shadow-sm">
                <!-- Icon mới cho độ ẩm với hiệu ứng animate -->
                <div class="animate-wave">
                    <i class="fa-solid fa-droplet text-3xl humid-theme"></i>
                </div>
            </div>
            <div class="flex-1">
                <div class="data-label humid-theme">Độ ẩm</div>
                <div class="data-value">
                    32.2<span class="unit">%</span>
                </div>
                <div class="status-pill humid-status">
                    <i class="fa-solid fa-wind mr-2"></i>Hơi khô
                </div>
                <div class="custom-progress">
                    <div class="progress-fill humid-fill" style="width: 32%;"></div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
