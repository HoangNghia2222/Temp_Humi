<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERa IoT Smart Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body {
            background: transparent; /* Quan trọng để hiển thị đẹp trong Dashboard */
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .widget-container {
            width: 100%;
            max-width: 380px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Glassmorphism cho Card */
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        /* Styling cho Switch 3D */
        .switch {
            font-size: 14px;
            position: relative;
            display: inline-block;
            width: 4.5em;
            height: 2.2em;
            user-select: none;
        }

        .switch .cb { opacity: 0; width: 0; height: 0; }

        .toggle {
            position: absolute;
            cursor: pointer;
            width: 100%; height: 100%;
            background-color: #373737;
            border-radius: 6px;
            transition: 0.4s;
            font-weight: 700;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .toggle .left, .toggle .right {
            position: absolute;
            display: flex;
            width: 50%; height: 90%;
            background-color: #f3f3f3;
            bottom: 0; align-items: center; justify-content: center;
            transition: all 150ms;
            text-transform: uppercase;
            font-size: 0.7rem;
        }

        .left { left: 0; transform: rotateX(10deg); transform-origin: right; color: #373737; }
        .right { right: 0; transform: rotateX(10deg) rotateY(-45deg); transform-origin: left; color: #ccc; }

        .cb:checked + .toggle .left { transform: rotateX(10deg) rotateY(45deg); color: #ccc; }
        .cb:checked + .toggle .right { transform: rotateX(10deg) rotateY(0deg); color: #487bdb; }

        /* Progress Bar */
        .progress-bg { height: 4px; background: #eee; border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.5s ease; }

        .temp-color { color: #f97316; }
        .humid-color { color: #0ea5e9; }
    </style>
</head>
<body>

    <div class="widget-container">
        
        <!-- Điều khiển Đèn (Action) -->
        <div class="card justify-between">
            <div class="flex items-center gap-3">
                <div class="icon-box bg-yellow-100 text-yellow-600">
                    <i class="fa-solid fa-lightbulb"></i>
                </div>
                <div>
                    <div class="text-[10px] font-extrabold uppercase tracking-wider text-gray-400">Thiết bị</div>
                    <div class="font-bold text-gray-700">Đèn Chiếu Sáng</div>
                </div>
            </div>
            <label class="switch">
                <input type="checkbox" id="light_switch" class="cb">
                <span class="toggle">
                    <span class="left">OFF</span>
                    <span class="right">ON</span>
                </span>
            </label>
        </div>

        <!-- Hiển thị Nhiệt độ (Realtime) -->
        <div class="card">
            <div class="icon-box bg-orange-50 text-orange-500">
                <i class="fa-solid fa-temperature-half"></i>
            </div>
            <div class="flex-1">
                <div class="text-[10px] font-extrabold uppercase tracking-wider text-orange-400">Nhiệt độ</div>
                <div class="text-2xl font-black text-gray-800"><span id="temp-val">--</span>°C</div>
                <div class="progress-bg"><div id="temp-bar" class="progress-fill bg-orange-500" style="width: 0%"></div></div>
            </div>
        </div>

        <!-- Hiển thị Độ ẩm (Realtime) -->
        <div class="card">
            <div class="icon-box bg-blue-50 text-blue-500">
                <i class="fa-solid fa-droplet"></i>
            </div>
            <div class="flex-1">
                <div class="text-[10px] font-extrabold uppercase tracking-wider text-blue-400">Độ ẩm</div>
                <div class="text-2xl font-black text-gray-800"><span id="humid-val">--</span>%</div>
                <div class="progress-bg"><div id="humid-bar" class="progress-fill bg-blue-500" style="width: 0%"></div></div>
            </div>
        </div>

    </div>

    <!-- E-Ra Widget Library -->
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        const eraWidget = new EraWidget();
        let configTemp = null, configHumid = null, configLight = null;
        let actions = [];

        const lightSwitch = document.getElementById('light_switch');
        const tempVal = document.getElementById('temp-val');
        const humidVal = document.getElementById('humid-val');
        const tempBar = document.getElementById('temp-bar');
        const humidBar = document.getElementById('humid-bar');

        eraWidget.init({
            needRealtimeConfigs: true,
            needActions: true,
            maxRealtimeConfigsCount: 3,
            maxActionsCount: 2,
            onConfiguration: (configuration) => {
                // Cấu hình các Pin từ Dashboard E-Ra
                // Giả sử: Pin 0 = Nhiệt độ, Pin 1 = Độ ẩm, Pin 2 = Trạng thái đèn
                configTemp = configuration.realtime_configs[0];
                configHumid = configuration.realtime_configs[1];
                configLight = configuration.realtime_configs[2];
                actions = configuration.actions;
            },
            onValues: (values) => {
                // Cập nhật giá trị nhiệt độ
                if (configTemp && values[configTemp.id]) {
                    const v = values[configTemp.id].value;
                    tempVal.innerText = v;
                    tempBar.style.width = Math.min(v, 100) + '%';
                }
                // Cập nhật giá trị độ ẩm
                if (configHumid && values[configHumid.id]) {
                    const v = values[configHumid.id].value;
                    humidVal.innerText = v;
                    humidBar.style.width = Math.min(v, 100) + '%';
                }
                // Cập nhật trạng thái switch đèn
                if (configLight && values[configLight.id]) {
                    lightSwitch.checked = (values[configLight.id].value == 1);
                }
            }
        });

        // Xử lý khi bấm nút switch trên giao diện
        lightSwitch.addEventListener('change', () => {
            if (lightSwitch.checked) {
                // Gọi hành động ON (thường là action đầu tiên trong danh sách)
                eraWidget.triggerAction(actions[0]?.action, null);
            } else {
                // Gọi hành động OFF (thường là action thứ hai)
                eraWidget.triggerAction(actions[1]?.action, null);
            }
        });
    </script>
</body>
</html>
